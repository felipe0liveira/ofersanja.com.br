steps:
  # Pull previous images for layer cache (ignore failure on first run)
  - name: gcr.io/cloud-builders/docker
    id: PullCache
    entrypoint: bash
    args:
      - -c
      - |
        docker pull $_IMAGE_BASE:latest || true
    timeout: 60s

  # Ensure base-runner image exists — builds and pushes it on first run,
  # then just pulls it on subsequent runs.
  - name: gcr.io/cloud-builders/docker
    id: EnsureBase
    entrypoint: bash
    args:
      - -c
      - |
        docker pull $_BASE_RUNNER || (docker build -f Dockerfile.base -t $_BASE_RUNNER . && docker push $_BASE_RUNNER)
    timeout: 300s

  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    timeout: 300s
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '--cache-from=$_IMAGE_BASE:latest'
      - '--build-arg=BASE_RUNNER=$_BASE_RUNNER'
      - '-t=$_IMAGE_BASE:$COMMIT_SHA'
      - '-t=$_IMAGE_BASE:latest'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '.'

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '$_IMAGE_BASE'
    id: Push
    timeout: 60s

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - ofersanja-webapp
      - '--platform=managed'
      - '--image=$_IMAGE_BASE:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--allow-unauthenticated'
      - '--region=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--concurrency=80'
      - '--set-secrets'
      - 'ML_AFFILIATE_SSID=mercadolivre-ssid:latest'
      - '--quiet'
    id: Deploy
    timeout: 120s
    entrypoint: gcloud

images:
  - '$_IMAGE_BASE:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_BASE: us-central1-docker.pkg.dev/ofersanja/application-images/ofersanja.com.br
  _BASE_RUNNER: us-central1-docker.pkg.dev/ofersanja/application-images/base-runner:latest
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'AIzaSyC9GXvIkX5BQel3qEq-7MC-5vln3vfwf3U'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'ofersanja.firebaseapp.com'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'ofersanja'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'ofersanja.firebasestorage.app'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '843065097069'
  _NEXT_PUBLIC_FIREBASE_APP_ID: '1:843065097069:web:63621e9d078f21abe87864'

tags:
  - github