steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    timeout: 180s
    args:
      - build
      - '-t'
      - '$_IMAGE_BASE:$COMMIT_SHA'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '.'

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '$_IMAGE_BASE'
    id: Push
    timeout: 30s

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - ofersanja.com.br
      - '--platform=managed'
      - '--image=$_IMAGE_BASE:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--allow-unauthenticated'
      - '--region=us-central1'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--concurrency=80'
      - '--quiet'
    id: Deploy
    timeout: 120s
    entrypoint: gcloud

images:
  - '$_IMAGE_BASE:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_BASE: us-central1-docker.pkg.dev/ofersanja/webapp/ofersanja.com.br
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'AIzaSyC9GXvIkX5BQel3qEq-7MC-5vln3vfwf3U'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'admin.ofersanja.com.br'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'ofersanja'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'ofersanja.firebasestorage.app'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '843065097069'
  _NEXT_PUBLIC_FIREBASE_APP_ID: '1:843065097069:web:63621e9d078f21abe87864'

tags:
  - github