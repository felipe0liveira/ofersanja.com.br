steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    timeout: 180s
    args:
      - build
      - '-t'
      - '$_IMAGE_BASE:$COMMIT_SHA'
      - '.'

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '$_IMAGE_BASE'
    id: Push
    timeout: 30s

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - ofersanja-website
      - '--platform=managed'
      - '--image=$_IMAGE_BASE:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--allow-unauthenticated'
      - '--region=us-central1'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--concurrency=80'
      - '--quiet'
    id: Deploy
    timeout: 120s
    entrypoint: gcloud

images:
  - '$_IMAGE_BASE:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_BASE: us-east1-docker.pkg.dev/felipeoliveira-xyz/ofersanja/ofersanja.com.br

tags:
  - github