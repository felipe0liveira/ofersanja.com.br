steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    timeout: 180s
    args:
      - build
      - '-t'
      - '$_IMAGE_BASE:$COMMIT_SHA'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '.'

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '$_IMAGE_BASE'
    id: Push
    timeout: 30s

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - ofersanja-website
      - '--platform=managed'
      - '--image=$_IMAGE_BASE:$COMMIT_SHA'
      - '--labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID'
      - '--allow-unauthenticated'
      - '--region=us-central1'
      - '--memory=128Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--concurrency=80'
      - '--quiet'
    id: Deploy
    timeout: 120s
    entrypoint: gcloud

images:
  - '$_IMAGE_BASE:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _IMAGE_BASE: us-east1-docker.pkg.dev/felipeoliveira-xyz/ofersanja/ofersanja.com.br
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'AIzaSyAoFseRnsKELl7mHRQIYXzC0Un2bM7JC8Q'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'felipeoliveira-xyz.firebaseapp.com'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'felipeoliveira-xyz'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'felipeoliveira-xyz.firebasestorage.app'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '186749716134'
  _NEXT_PUBLIC_FIREBASE_APP_ID: '1:186749716134:web:8db0a4eedee529e931d667'

tags:
  - github